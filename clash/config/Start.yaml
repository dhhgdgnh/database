# =========================================
#                锚点配置
# =========================================
anchor:
  # 规则提供者相关锚点
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}
  class-yaml: &class-yaml {type: http, interval: 86400, behavior: classical, format: yaml}

# =========================================
#              代理提供商
# =========================================
proxy-providers:
  Sub-store:                    # 名称
    url: "url"                  # 订阅地址（占位）
    type: http                  # 类型为 http
    interval: 86400             # 每 24 小时更新一次
    health-check:               # 健康度检测模块
      enable: true              # 启用健康检查
      url: https://www.gstatic.com/generate_204  # 检查连接是否可用
      interval: 300             # 每 5 分钟检查一次
    proxy:  DIRECT              # 拉取代理所用节点
    override:                   # 节点附加设置
      skip-cert-verify: true    # 跳过证书验证
      udp: true                 # UDP支持

# =========================================
#                 外部访问配置
# =========================================
port: 7890                      # HTTP 代理端口
socks-port: 7891                # SOCKS 代理端口
mixed-port: 7893                # 混合端口
redir-port: 7892                # Redir 透明代理端口
tproxy-port: 7894               # TProxy 端口
allow-lan: true                 # 允许局域网访问
bind-address: "*"               # 监听所有网卡
authentication:                 # 身份验证
  - "mihome:mihome666"

# =========================================
#                 内核运行配置
# =========================================
find-process-mode: off          # 进程匹配
mode: rule                      # 运行模式
log-level: warning              # 日志等级
ipv6: true                      # IPV6支持
profile:                        # 持久化设置
  store-selected: true          # 面板策略组持久化
  store-fake-ip: true           # Fake-ip持久化
tcp-concurrent: true            # TCP并发
unified-delay: true             # 统一延迟
keep-alive-interval: 15         # TCP 保活间隔
keep-alive-idle: 600            # TCP 空闲等待 

# =========================================
#                 面板配置
# =========================================
external-ui: ui     # 面板路径
external-ui-name: zashboard     # 面板名称
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip     # 面板下载地址
external-controller: "0.0.0.0:9090"     # 面板监听端口
secret: "password"     # 面板访问密码

# =========================================
#                 GEO 数据库配置
# =========================================
geox-url:
  geoip: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat"
  geosite: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat"
  mmdb: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.metadb"
geo-auto-update: true           # 自动更新   
geo-update-interval: 24         # 间隔一天（24小时）

# =========================================
#                嗅探配置
# =========================================
sniffer:
  enable: true
  override-destination: true
  sniff:
    QUIC:
      ports:
      - 443
    TLS:
      ports:
      - 443
      - 8443
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
  force-domain:
  - "+.netflix.com"
  - "+.nflxvideo.net"
  - "+.amazonaws.com"
  - "+.media.dssott.com"
  skip-domain:
  - "+.apple.com"
  - Mijia Cloud
  - dlg.io.mi.com
  - "+.oray.com"
  - "+.sunlogin.net"
  - "+.push.apple.com"
  parse-pure-ip: true
  force-dns-mapping: true

# =========================================
#             TUN入站配置
# =========================================
tun:
  enable: true                  # 启用 TUN 功能，用于透明代理
  stack: mixed                  # 使用混合协议栈（支持 TCP + UDP）
  device: mihome                # TUN 虚拟网卡名称，可自定义
  dns-hijack:                   # DNS 劫持设置
    - "any:53"
    - "tcp://any:53"            
  auto-route: true              # 自动添加路由表
  auto-detect-interface: true   # 自动检测网络接口，绑定 TUN
  auto-redirect: true           # 自动重定向流量到 TUN
  endpoint-independent-nat: true  # 启用端点独立 NAT，保证 UDP 稳定性
  strict-route: true            # 严格路由模式，强制匹配规则走指定出口

# =========================================
#                 DNS 配置
# =========================================
dns:
  enable: true                  # 启用 DNS 功能 
  ipv6: true                   # 支持 IPv6
  enhanced-mode: fake-ip        # 启用 Fake-IP
  fake-ip-range: 198.18.0.1/16  # IPv4 Fake-IP 网段
  fake-ip-range6: fdfe:dcba:9876::1/64  #IPv4 Fake-IP 网段

  listen: 0.0.0.0:1053          # DNS 监听地址和端口
  respect-rules: false          # 是否遵循DNS规则
  fake-ip-filter-mode: blacklist  # Fake-IP 黑名单
  nameserver:                   # DNS 上游服务器（用于国内域名解析）
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  default-nameserver:           # 默认DNS服务器 （用于解析上游Doh和兜底解析）
    - https://223.5.5.5/dns-query
    - tls://1.1.1.1:853
  fake-ip-filter:               # fake-ip 黑名单列表 (列表内的域名解析将返回真实ip)
    - "*.lan"
    - "*.local"
    - "*.home"
    - "*.arpa"
    - "RULE-SET,private"
    - "geosite:cn"

# =========================================
#             策略组配置
# =========================================
